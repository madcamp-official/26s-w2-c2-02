appId: com.roomi.desktop
productName: Roomi
copyright: Copyright © 2026 Roomi

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json

asar: true

extraResources:
  - from: resources/roomi-icon.png
    to: roomi-icon.png

win:
  icon: resources/roomi-icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Roomi
  uninstallDisplayName: Roomi

mac:
  icon: resources/roomi-icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: Roomi가 스터디룸 화상 통화를 위해 카메라를 사용합니다.
    NSMicrophoneUsageDescription: Roomi가 스터디룸 화상 통화를 위해 마이크를 사용합니다.

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

publish:
  provider: github
  owner: madcamp-official
  repo: 26s-w2-c2-02
  releaseType: release
