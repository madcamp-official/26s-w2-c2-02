appId: com.roomi.desktop
productName: Roomi
copyright: Copyright © 2026 Roomi

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json

asar: true

extraResources:
  - from: resources/roomi-icon.png
    to: roomi-icon.png

win:
  icon: resources/roomi-icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Roomi
  uninstallDisplayName: Roomi

mac:
  icon: resources/roomi-icon.png
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}

publish: null
